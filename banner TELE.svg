<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="50%" stop-color="#101826"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#229ED9"/>
    <stop offset="50%" stop-color="#2ecc71"/>
    <stop offset="100%" stop-color="#5be9ff"/>
    <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="100%;200%;100%" dur="6s" repeatCount="indefinite"/>
  </linearGradient>
  <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#229ED9" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#229ED9" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#161b22" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#10151c" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#229ED9"/>
    <stop offset="100%" stop-color="#2ecc71"/>
  </linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2733" stroke-width="0.5"/>
  </pattern>
</defs>

<rect width="1600" height="500" rx="20" fill="url(#bgGrad)"/>
<rect width="1600" height="500" rx="20" fill="url(#grid)" opacity="0.5"/>
<rect x="3" y="3" width="1594" height="494" rx="18" fill="none" stroke="url(#borderGrad)" stroke-width="3" filter="url(#glow)"/>

<circle cx="220" cy="120" r="120" fill="url(#blob1)"><animate attributeName="cy" values="120;150;120" dur="9s" repeatCount="indefinite"/></circle>
<circle cx="1400" cy="380" r="140" fill="url(#blob2)"><animate attributeName="cy" values="380;350;380" dur="11s" repeatCount="indefinite"/></circle>

<g font-family="Consolas,monospace" font-size="20" opacity="0.5">
  <text x="60" y="40">💰<animateMotion path="M0,0 q20,-15 0,-30 q-20,-15 0,-30" dur="10s" repeatCount="indefinite"/></text>
  <text x="1540" y="55">📈<animateMotion path="M0,0 q-15,20 0,40 q15,20 0,40" dur="12s" repeatCount="indefinite"/></text>
  <text x="1500" y="160">📊<animateMotion path="M0,0 q20,15 0,30 q-20,15 0,30" dur="9s" repeatCount="indefinite"/></text>
  <text x="40" y="430">🏆<animateMotion path="M0,0 q15,-20 0,-40 q-15,-20 0,-40" dur="13s" repeatCount="indefinite"/></text>
  <text x="780" y="30">🎯<animateMotion path="M0,0 q25,10 0,20 q-25,10 0,20" dur="8s" repeatCount="indefinite"/></text>
  <text x="1560" y="460">💳<animateMotion path="M0,0 q-20,-10 0,-20 q20,-10 0,-20" dur="10s" repeatCount="indefinite"/></text>
  <text x="20" y="250">📅<animateMotion path="M0,0 q15,15 0,30 q-15,15 0,30" dur="11s" repeatCount="indefinite"/></text>
  <text x="900" y="470">☕<animateMotion path="M0,0 q-15,-15 0,-30 q15,-15 0,-30" dur="9s" repeatCount="indefinite"/></text>
</g>

<g>
  <circle cx="300" cy="60" r="1.6" fill="#5be9ff"><animate attributeName="cy" values="60;0;60" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="900" cy="80" r="1.6" fill="#229ED9"><animate attributeName="cy" values="80;20;80" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="1200" cy="50" r="1.6" fill="#2ecc71"><animate attributeName="cy" values="50;0;50" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"/></circle>
</g>

<text x="800" y="42" text-anchor="middle" font-family="Consolas,monospace" font-size="30" font-weight="700" fill="#f0f6fc">🤖 Telegram Personal Expense Tracker Bot</text>
<text x="800" y="64" text-anchor="middle" font-family="Consolas,monospace" font-size="13" fill="#8b949e">Track every expense. Visualize your spending. Achieve your savings goals.</text>

